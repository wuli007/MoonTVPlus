name = "moontv-plus"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"
minify = true

# 静态资源配置
# Cloudflare Workers Assets 用于服务静态文件
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "moontvplus"
database_id = "811c9901-d680-4046-8af8-7b456c369e7c"

[vars]
NODE_ENV = "production"
BUILD_TARGET = "cloudflare"
USERNAME = "wuhu"
NEXT_PUBLIC_STORAGE_TYPE = "d1"
